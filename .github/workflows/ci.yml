name: ci

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test Heimdall
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\Heimdall\Heimdall.slnx

      - name: Build
        run: dotnet build .\Heimdall\Heimdall.slnx --configuration Release --no-restore -p:GenerateAppxPackageOnBuild=false -p:AppxPackageSigningEnabled=false -p:PublishReadyToRun=false -p:PublishTrimmed=false

      - name: Run regression tests
        run: dotnet test .\Heimdall\Heimdall.slnx --configuration Release --no-build --verbosity normal --filter FullyQualifiedName~Regression

      - name: Run full test suite
        run: dotnet test .\Heimdall\Heimdall.slnx --configuration Release --no-build --verbosity normal
